<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grocery Sync — King Soopers Cart Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #FAFAF7;
      --surface: #FFFFFF;
      --surface-hover: #F5F5F0;
      --border: #E8E6DF;
      --border-focus: #2D5A3D;
      --text-primary: #1A1A18;
      --text-secondary: #6B6960;
      --text-muted: #9B978C;
      --accent: #2D5A3D;
      --accent-light: #E8F0EB;
      --accent-hover: #234A31;
      --red: #C0392B;
      --red-light: #FDECEA;
      --checked-text: #B0AD9F;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
      background: rgba(255,255,255,0.92);
    }

    .header-inner {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-icon {
      width: 42px;
      height: 42px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 2px 8px rgba(45,90,61,0.25);
    }

    .header-text h1 {
      font-family: 'Fraunces', serif;
      font-size: 20px;
      font-weight: 500;
      letter-spacing: -0.3px;
      color: var(--text-primary);
    }

    .header-text p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 1px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .sync-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--accent);
      background: var(--accent-light);
      padding: 5px 10px;
      border-radius: 20px;
      font-weight: 500;
    }

    .sync-dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Main Container ── */
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px 16px 120px;
    }

    /* ── Add Item Section ── */
    .add-section {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 16px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
    }

    .add-row {
      display: flex;
      gap: 10px;
    }

    .add-input {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 16px;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .add-input::placeholder {
      color: var(--text-muted);
    }

    .add-input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(45,90,61,0.1);
    }

    .qty-input {
      width: 64px;
      padding: 12px 8px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 16px;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      text-align: center;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .qty-input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(45,90,61,0.1);
    }

    .add-btn {
      padding: 12px 20px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .add-btn:hover { background: var(--accent-hover); }
    .add-btn:active { transform: scale(0.97); }

    /* ── List Stats ── */
    .list-stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding: 0 4px;
    }

    .list-stats span {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .clear-checked-btn {
      font-size: 12px;
      color: var(--red);
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .clear-checked-btn:hover {
      background: var(--red-light);
    }

    /* ── Grocery List ── */
    .grocery-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .grocery-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.2s;
      box-shadow: var(--shadow-sm);
      animation: slideIn 0.25s ease-out;
    }

    .grocery-item:hover {
      box-shadow: var(--shadow-md);
    }

    .grocery-item.checked {
      background: var(--surface-hover);
      border-color: transparent;
      box-shadow: none;
    }

    .grocery-item.checked .item-name {
      text-decoration: line-through;
      color: var(--checked-text);
    }

    .grocery-item.checked .item-qty {
      color: var(--checked-text);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Custom checkbox */
    .checkbox {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      background: var(--surface);
    }

    .checkbox:hover {
      border-color: var(--accent);
    }

    .checkbox.is-checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .checkbox.is-checked::after {
      content: '';
      width: 6px;
      height: 10px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg) translateY(-1px);
    }

    .item-details {
      flex: 1;
      min-width: 0;
    }

    .item-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
      transition: color 0.2s;
    }

    .item-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .item-qty {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 600;
      background: var(--bg);
      padding: 4px 10px;
      border-radius: 6px;
      flex-shrink: 0;
      transition: color 0.2s;
    }

    .delete-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.2s;
      flex-shrink: 0;
      opacity: 0;
    }

    .grocery-item:hover .delete-btn {
      opacity: 1;
    }

    .delete-btn:hover {
      background: var(--red-light);
      color: var(--red);
    }

    /* ── Empty State ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.6;
    }

    .empty-state h3 {
      font-family: 'Fraunces', serif;
      font-weight: 500;
      font-size: 18px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .empty-state p {
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Footer Notice ── */
    .footer-notice {
      text-align: center;
      padding: 24px;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ── Loading State ── */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Connection Error ── */
    .error-banner {
      background: #FEF3C7;
      border: 1px solid #F59E0B;
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #92400E;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .error-banner.show {
      display: flex;
    }

    /* ── Mobile Touch ── */
    @media (max-width: 600px) {
      .header { padding: 16px; }
      .container { padding: 16px 12px 120px; }
      .delete-btn { opacity: 0.6; }
      .add-row { flex-wrap: wrap; }
      .add-input { min-width: 0; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <div class="header-icon">🛒</div>
        <div class="header-text">
          <h1>Grocery Sync</h1>
          <p>King Soopers · Pickup</p>
        </div>
      </div>
      <div class="sync-badge" id="syncBadge">
        <div class="sync-dot"></div>
        <span>Live</span>
      </div>
    </div>
  </header>

  <main class="container">

    <div class="error-banner" id="errorBanner">
      ⚠️ <span>Having trouble connecting. Changes may not sync.</span>
    </div>

    <div class="add-section">
      <div class="add-row">
        <input
          type="text"
          class="add-input"
          id="itemInput"
          placeholder="Add an item…"
          autocomplete="off"
        >
        <input
          type="number"
          class="qty-input"
          id="qtyInput"
          placeholder="Qty"
          min="1"
          value="1"
        >
        <button class="add-btn" id="addBtn">Add</button>
      </div>
    </div>

    <div id="listStats" class="list-stats" style="display: none;">
      <span id="itemCount"></span>
      <button class="clear-checked-btn" id="clearCheckedBtn">Clear checked</button>
    </div>

    <div id="loadingState" class="loading">
      <div class="loading-spinner"></div>
      <p>Connecting to your list…</p>
    </div>

    <div id="groceryList" class="grocery-list" style="display: none;"></div>

    <div id="emptyState" class="empty-state" style="display: none;">
      <div class="empty-icon">🥬</div>
      <h3>Your list is empty</h3>
      <p>Add items above — they'll sync<br>for everyone in real time.</p>
    </div>

    <div class="footer-notice">
      Grocery Sync · King Soopers Pickup · Never auto-charges
    </div>

  </main>

  <!-- Firebase SDK (modular, from CDN) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      deleteDoc,
      updateDoc,
      doc,
      query,
      orderBy,
      onSnapshot,
      serverTimestamp,
      writeBatch
    } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    // ── Firebase Config ──
    const firebaseConfig = {
      apiKey: "AIzaSyD5RXTAOkMZkNbnXIJsVKMqDhxqOF5YEZk",
      authDomain: "grocery-bot-ca9d4.firebaseapp.com",
      projectId: "grocery-bot-ca9d4",
      storageBucket: "grocery-bot-ca9d4.firebasestorage.app",
      messagingSenderId: "717832338868",
      appId: "1:717832338868:web:88720a92182f44e86646e1",
      measurementId: "G-R92N6FZ00K"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const itemsRef = collection(db, "groceryList");

    // ── DOM Elements ──
    const itemInput = document.getElementById("itemInput");
    const qtyInput = document.getElementById("qtyInput");
    const addBtn = document.getElementById("addBtn");
    const groceryList = document.getElementById("groceryList");
    const emptyState = document.getElementById("emptyState");
    const loadingState = document.getElementById("loadingState");
    const listStats = document.getElementById("listStats");
    const itemCount = document.getElementById("itemCount");
    const clearCheckedBtn = document.getElementById("clearCheckedBtn");
    const errorBanner = document.getElementById("errorBanner");
    const syncBadge = document.getElementById("syncBadge");

    let items = [];

    // ── Listen for real-time updates ──
    const q = query(itemsRef, orderBy("createdAt", "asc"));

    onSnapshot(q, (snapshot) => {
      loadingState.style.display = "none";
      errorBanner.classList.remove("show");
      syncBadge.querySelector("span").textContent = "Live";

      items = [];
      snapshot.forEach((docSnap) => {
        items.push({ id: docSnap.id, ...docSnap.data() });
      });

      renderList();
    }, (error) => {
      console.error("Firestore error:", error);
      loadingState.style.display = "none";
      errorBanner.classList.add("show");
      syncBadge.querySelector("span").textContent = "Offline";
    });

    // ── Render the list ──
    function renderList() {
      // Separate unchecked and checked
      const unchecked = items.filter(i => !i.checked);
      const checked = items.filter(i => i.checked);
      const sorted = [...unchecked, ...checked];

      if (sorted.length === 0) {
        groceryList.style.display = "none";
        emptyState.style.display = "block";
        listStats.style.display = "none";
        return;
      }

      emptyState.style.display = "none";
      groceryList.style.display = "flex";
      listStats.style.display = "flex";

      const checkedCount = checked.length;
      const totalCount = sorted.length;
      itemCount.textContent = `${totalCount - checkedCount} item${totalCount - checkedCount !== 1 ? 's' : ''} remaining`;
      clearCheckedBtn.style.display = checkedCount > 0 ? "inline" : "none";

      groceryList.innerHTML = sorted.map(item => `
        <div class="grocery-item ${item.checked ? 'checked' : ''}" data-id="${item.id}">
          <div class="checkbox ${item.checked ? 'is-checked' : ''}" onclick="window.toggleItem('${item.id}', ${!item.checked})"></div>
          <div class="item-details">
            <div class="item-name">${escapeHtml(item.name)}</div>
            ${item.addedBy ? `<div class="item-meta">Added by ${escapeHtml(item.addedBy)}</div>` : ''}
          </div>
          ${item.quantity && item.quantity > 1 ? `<div class="item-qty">×${item.quantity}</div>` : ''}
          <button class="delete-btn" onclick="window.deleteItem('${item.id}')" title="Remove">✕</button>
        </div>
      `).join("");
    }

    function escapeHtml(text) {
      const d = document.createElement("div");
      d.textContent = text;
      return d.innerHTML;
    }

    // ── Add Item ──
    async function addItem() {
      const name = itemInput.value.trim();
      if (!name) return;

      const qty = parseInt(qtyInput.value) || 1;

      try {
        await addDoc(itemsRef, {
          name: name,
          quantity: qty,
          checked: false,
          addedBy: "",
          createdAt: serverTimestamp()
        });
        itemInput.value = "";
        qtyInput.value = "1";
        itemInput.focus();
      } catch (err) {
        console.error("Error adding item:", err);
        errorBanner.classList.add("show");
      }
    }

    addBtn.addEventListener("click", addItem);
    itemInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") addItem();
    });

    // ── Toggle checked ──
    window.toggleItem = async function(id, checked) {
      try {
        await updateDoc(doc(db, "groceryList", id), { checked });
      } catch (err) {
        console.error("Error toggling item:", err);
      }
    };

    // ── Delete item ──
    window.deleteItem = async function(id) {
      try {
        await deleteDoc(doc(db, "groceryList", id));
      } catch (err) {
        console.error("Error deleting item:", err);
      }
    };

    // ── Clear all checked items ──
    clearCheckedBtn.addEventListener("click", async () => {
      const checkedItems = items.filter(i => i.checked);
      if (checkedItems.length === 0) return;

      try {
        const batch = writeBatch(db);
        checkedItems.forEach(item => {
          batch.delete(doc(db, "groceryList", item.id));
        });
        await batch.commit();
      } catch (err) {
        console.error("Error clearing checked:", err);
      }
    });

  </script>
</body>
</html>
